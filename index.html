<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center">Dual City Weather Dashboard</h2>

    <!-- Inputs -->
    <div class="row mt-3">
        <div class="col-md-5">
            <input type="text" id="city1" class="form-control" placeholder="Enter City 1">
        </div>

        <div class="col-md-5">
            <input type="text" id="city2" class="form-control" placeholder="Enter City 2">
        </div>

        <div class="col-md-2">
            <button id="searchBtn" class="btn btn-primary w-100">Search</button>
        </div>
    </div>

    <!-- Results -->
    <div class="row mt-4">

        <div class="col-md-6">
            <div class="card p-3" id="card1">
                <h4>City 1</h4>
                <p>Temp: <span class="temp"></span></p>
                <p>Humidity: <span class="humidity"></span></p>
                <p>PM2.5: <span class="pm25"></span></p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3" id="card2">
                <h4>City 2</h4>
                <p>Temp: <span class="temp"></span></p>
                <p>Humidity: <span class="humidity"></span></p>
                <p>PM2.5: <span class="pm25"></span></p>
            </div>
        </div>

    </div>

    <!-- show Error -->
    <div class="alert alert-danger mt-3" style="display:none;"></div>

</div>
<!-- other file calling --->
<script src="script.js"></script>

</body>
</html>
